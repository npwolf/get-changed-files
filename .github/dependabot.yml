version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "fix(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - dependencies
    cooldown:
      default-days: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
    cooldown:
      default-days: 5
